name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      # Requires one-time setup: Settings → Pages → Source: "GitHub Actions".
      - uses: actions/configure-pages@v5
      # Publish the landing/legal pages (site/) at the root, plus a TEMPORARY
      # testing copy of the app under /app/ so the flow can be clicked through
      # in a browser. Remove the /app/ copy before public launch (the app is a
      # native product; a free web version would undercut the paid unlock).
      - name: Assemble deploy (landing + testing copy of the app)
        run: |
          rm -rf _deploy && mkdir _deploy
          cp -r site/. _deploy/
          mkdir -p _deploy/app && cp -r www/. _deploy/app/
          sed -i "s/__BUILD__/${GITHUB_SHA}/" _deploy/app/sw.js || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _deploy
      - id: deployment
        uses: actions/deploy-pages@v4
